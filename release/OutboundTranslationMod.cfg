[General]

## Dump discovered translation keys and resolved text to translation-dump.txt.
## Keep disabled for normal play. Enable only when reporting missing or hardcoded text.
DumpTranslations = false

## Replace translated strings from the configured labels file.
EnableTranslationOverrides = true

## Translation file name inside the translations folder.
LabelsFileName = labels.txt

## Game language enum value that should be treated as the translated language slot.
## Outbound Bulgarian currently replaces Ukrainian.
TargetLanguageName = Ukrainian

## Apply replacements regardless of the currently selected game language.
## Keep false for normal play.
OverrideAllLanguages = false

## Assume the configured translated language slot is active before the game reports its saved language.
## Required for Outbound's initial main menu when replacing Ukrainian.
AssumeTargetLanguageOnStartup = true
