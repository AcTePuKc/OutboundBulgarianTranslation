[General]

## Записва открити translation ключове и resolved текст в translation-dump.txt.
## Дръж изключено за нормална игра. Включвай само при докладване на липсващ или hardcoded текст.
DumpTranslations = false

## Заменя преведените текстове от избрания labels файл.
EnableTranslationOverrides = true

## Заменя collectible имената на гномите от translations/gnome-names.txt.
EnableGnomeNameOverrides = true

## Заменя N/E/S/W само в compass UI на Outbound.
EnableCompassDirectionOverrides = true

## Име на translation файла в папката translations.
LabelsFileName = labels.txt

## Game language enum стойност, която се използва като превеждан езиков слот.
## Българският превод за Outbound в момента заменя Ukrainian.
TargetLanguageName = Ukrainian

## Прилага замените независимо от избрания език в играта.
## Дръж false за нормална игра.
OverrideAllLanguages = false

## Приема, че избраният превеждан езиков слот е активен, преди играта да съобщи запазения език.
## Нужно за началното меню на Outbound при замяна на Ukrainian.
AssumeTargetLanguageOnStartup = true

[Debug]

## Логва активни compass direction text кандидати и hierarchy paths.
## Дръж изключено за нормална игра.
DumpCompassDirectionCandidates = false
